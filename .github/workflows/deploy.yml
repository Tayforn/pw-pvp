name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      # History-роутинг вимагає абсолютної бази підпапки GH Pages.
      # VITE_SUPABASE_* — публічний anon-ключ, безпечний прямо в білді
      # (не секрет: доступ обмежує RLS на стороні Supabase, не приховування ключа).
      - run: npm run build
        env:
          VITE_BASE: /pw-pvp/
          VITE_SUPABASE_URL: https://vnlqxqxnslxcisqfhvsg.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_GLrZl0x0jaNFsvLv68ZGgw_OBp_BH_G
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
